# Tests d'intégration : base en mémoire (pas de MySQL requis)
spring.datasource.url=jdbc:h2:mem:sgci_workflow_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false

# JWT (même clé que le dev pour décoder les tokens de test si besoin)
app.jwt.secret=SGCI-Secret-Key-Minimum-256-bits-For-HS256-Please-Change-In-Production
app.jwt.expiration-ms=86400000

# Stockage local : pas de MinIO requis pour les tests d’intégration
app.storage.backend=local

minio.url=http://localhost:9000
minio.access-key=test
minio.secret-key=testtest
minio.bucket=test-bucket

app.upload.dir=test-uploads

# Moins de bruit
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
