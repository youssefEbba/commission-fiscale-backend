# Application
spring.application.name=sgci-backend
server.port=8080

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sgci_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Encodage
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# JWT (à remplacer en production par une clé forte et une variable d'environnement)
app.jwt.secret=SGCI-Secret-Key-Minimum-256-bits-For-HS256-Please-Change-In-Production
app.jwt.expiration-ms=86400000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Taux de change (API externe)
# URL doit contenir {base}
app.exchange-rate.base=MRU
app.exchange-rate.url=https://open.er-api.com/v6/latest/{base}

# Exchangerate.host (convert EUR/USD -> MRU)
app.exchangerate.host.url=https://api.exchangerate.host
# Mettre la clé en variable d'environnement en prod (ex: APP_EXCHANGERATE_HOST_ACCESS_KEY)
app.exchangerate.host.access-key=6ded2d0c03b750cd8525a4ab8a2df010

# Logs (debug HTTP + sécurité)
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Dossier de stockage des documents uploadés (relatif au répertoire de travail ou chemin absolu)
app.upload.dir=uploads
# MinIO (API S3) — par défaut instance locale (Docker: -p 9000:9000)
# Pour un tunnel ngrok ou un serveur distant : export MINIO_URL=https://votre-sous-domaine.ngrok-free.app
minio.url=${MINIO_URL:https://superelegant-irretraceably-liv.ngrok-free.dev}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password123}
minio.bucket=${MINIO_BUCKET:documents}

app.seed.demande-correction.enabled=true
# Taille max fichier
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Parse multipart seulement quand le contrôleur y accède (évite toute lecture précoce du corps dans la chaîne de filtres)
spring.servlet.multipart.resolve-lazily=true
