# Application (commun à tous les profils)
spring.application.name=sgci-backend
server.port=8080

# Profil par défaut : local (développement). Production : SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (dialecte commun)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Développement (profil local) : valeurs par défaut si application-local.properties est absent ---
# Vous pouvez surcharger via src/main/resources/application-local.properties (fichier ignoré par Git).
# allowPublicKeyRetrieval=true : souvent nécessaire pour MySQL 8 (Ubuntu / caching_sha2_password)
spring.datasource.url=jdbc:mysql://localhost:3306/sgci_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Encodage
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# JWT (en production préférer APP_JWT_SECRET en variable d'environnement)
app.jwt.secret=${APP_JWT_SECRET:SGCI-Secret-Key-Minimum-256-bits-For-HS256-Please-Change-In-Production}
app.jwt.expiration-ms=86400000
# JWT commission relais (impersonation) — TTL plus court (4 h par défaut)
app.jwt.relais-expiration-ms=14400000

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- APIs de change (externes, non maîtrisées) ---
# En panne réseau / quota : erreur HTTP 503 + code EXTERNAL_EXCHANGE_SERVICE_UNAVAILABLE côté API REST.
app.exchange-rate.base=MRU
app.exchange-rate.url=https://open.er-api.com/v6/latest/{base}

app.exchangerate.host.url=https://api.exchangerate.host
app.exchangerate.host.access-key=${APP_EXCHANGERATE_HOST_ACCESS_KEY:6ded2d0c03b750cd8525a4ab8a2df010}

# --- Stockage fichiers ---
# minio (défaut) : nécessite MinIO joignable ; sinon 503 OBJECT_STORAGE_UNAVAILABLE sur upload.
# local : écrit sous app.upload.dir, URLs relatives /api/local-files/{nom} (téléchargement authentifié).
app.storage.backend=${APP_STORAGE_BACKEND:minio}
# Dossier uploads (mode local + réserve)
app.upload.dir=uploads

# MinIO (ignoré si app.storage.backend=local)
minio.url=${MINIO_URL:https://superelegant-irretraceably-liv.ngrok-free.dev}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:password123}
minio.bucket=${MINIO_BUCKET:documents}

# Si false : aucune nouvelle demande de démo ADOPTEE au démarrage (voir seedDemandeCorrectionAdopteeDemo).
# Les enregistrements déjà présents en base (MySQL + ddl-auto=update) ne sont pas supprimés : les effacer à la main si besoin.
app.seed.demande-correction.enabled=true
# Certificat OUVERT de démo (N° CI-DEMO-OUVERT) lié à DC-DEFAULT-DEMO — désactiver en prod si besoin.
app.seed.certificat-ouvert.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.resolve-lazily=true
