# Production — lancer avec : export SPRING_PROFILES_ACTIVE=prod
# (sinon le profil par défaut reste "local" avec utilisateur root depuis application.properties)
#
# MySQL (phpMyAdmin / serveur) — surcharge possible : SPRING_DATASOURCE_URL, USERNAME, PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sgci_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Admin@1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=INFO
