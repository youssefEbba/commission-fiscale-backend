# MinIO pour développement local (même URL / identifiants que application.properties)
# Démarrage : docker compose -f docker-compose.minio.yml up -d
# API S3 : http://127.0.0.1:9000  |  Console web : http://127.0.0.1:9001  (admin / password123)
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_sgci_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      for i in $$(seq 1 40); do
        mc alias set local http://minio:9000 admin password123 2>/dev/null && break;
        sleep 1;
      done;
      mc mb local/documents --ignore-existing;
      echo 'Bucket documents pret.';
      "

volumes:
  minio_sgci_data:
